<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Абонементи - CRM</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="loadingSpinner" class="loading-spinner hidden"><div class="spinner-icon"></div></div>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-dumbbell"></i>
                <h2>CRM Школа</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Дашборд</span></a>
                <a href="students.html" class="nav-item"><i class="fas fa-users"></i><span>Учні</span></a>
                <a href="attendance.html" class="nav-item"><i class="fas fa-clipboard-check"></i><span>Відвідування</span></a>
                <a href="assignments.html" class="nav-item"><i class="fas fa-magic"></i><span>Призначення</span></a>
                <a href="prices.html" class="nav-item"><i class="fas fa-tags"></i><span>Прайс-лист</span></a>
                <a href="groups.html" class="nav-item"><i class="fas fa-layer-group"></i><span>Групи</span></a>
                <a href="subscriptions.html" class="nav-item active" id="subscriptionsLink"><i class="fas fa-ticket-alt"></i><span>Абонементи</span></a>
                <a href="users.html" class="nav-item" id="usersLink" style="display: none;"><i class="fas fa-user-cog"></i><span>Користувачі</span></a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <div><p id="userName">Користувач</p><small id="userRoleDisplay">Роль</small></div>
                </div>
                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Вийти</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <div class="header-title-wrap">
                    <button class="mobile-toggle" id="mobileToggle"><i class="fas fa-bars"></i></button>
                    <h1>Абонементи учнів</h1>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" id="addSubscriptionBtn" onclick="openAddSubscriptionModal()">
                        <i class="fas fa-plus"></i> Додати абонемент
                    </button>
                </div>
            </header>

            <div class="content-body">
                <div class="filter-bar">
                    <input type="text" id="searchSubscriptions" placeholder="Пошук за учнем або абонементом..." class="filter-input">
                </div>
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Учень</th>
                                <th>Тип абонемента</th>
                                <th>Залишок занять</th>
                                <th>Початок дії</th>
                                <th>Кінець дії</th>
                                <th>Статус</th>
                                <th class="text-right">Дії</th>
                            </tr>
                        </thead>
                        <tbody id="subscriptionsTableBody">
                            <tr><td colspan="7" class="text-center">Завантаження абонементів...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Модалка Додавання/Редагування Абонемента -->
    <div id="subscriptionModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="subscriptionModalTitle">Додати абонемент</h2>
                <button class="modal-close" onclick="closeSubscriptionModal()">&times;</button>
            </div>
            <form id="subscriptionForm" class="modal-form">
                <input type="hidden" id="subscriptionId">
                <div class="form-group">
                    <label for="studentSelect">Учень *</label>
                    <select id="studentSelect" required><option value="">Оберіть учня...</option></select>
                </div>
                <div class="form-group">
                    <label for="pricelistItemSelect">Вид абонемента *</label>
                    <select id="pricelistItemSelect" required><option value="">Оберіть вид абонемента...</option></select>
                </div>
                <div class="form-group">
                    <label for="classesRemaining">Кількість занять *</label>
                    <input type="number" id="classesRemaining" min="0" value="0" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeSubscriptionModal()">Скасувати</button>
                    <button type="submit" class="btn btn-primary" id="saveSubscriptionBtn">Зберегти</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/config.js?v=1778184204"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js?v=1778184204"></script>
    <script src="../js/subscriptions.js"></script>
</body>
</html>
