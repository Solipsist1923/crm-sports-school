<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Групи - CRM</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="loadingSpinner" class="loading-spinner hidden"><div class="spinner-icon"></div></div>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-dumbbell"></i>
                <h2>CRM Школа</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Дашборд</span>
                </a>
                <a href="students.html" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Учні</span>
                </a>
                <a href="attendance.html" class="nav-item">
                    <i class="fas fa-clipboard-check"></i>
                    <span>Відвідування</span>
                </a>
                <a href="assignments.html" class="nav-item">
                    <i class="fas fa-magic"></i>
                    <span>Призначення</span>
                </a>
                <a href="prices.html" class="nav-item">
                    <i class="fas fa-tags"></i>
                    <span>Прайс-лист</span>
                </a>
                <a href="groups.html" class="nav-item active">
                    <i class="fas fa-layer-group"></i>
                    <span>Групи</span>
                </a>
                <a href="users.html" class="nav-item" id="usersLink" style="display: none;">
                    <i class="fas fa-user-cog"></i>
                    <span>Користувачі</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <div>
                        <p id="userName">Користувач</p>
                        <small id="userRoleDisplay">Роль</small>
                    </div>
                </div>
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    Вийти
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <div class="header-title-wrap">
                    <button class="mobile-toggle" id="mobileToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1>Групи</h1>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="openAddGroupModal()">
                        <i class="fas fa-plus"></i>
                        Додати групу
                    </button>
                </div>
            </header>

            <!-- Groups Grid -->
            <div class="groups-grid" id="groupsGrid">
                <div class="text-center" style="grid-column: 1/-1; padding: 40px;">
                    Завантаження...
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Group Modal -->
    <div id="groupModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Додати групу</h2>
                <button class="modal-close" onclick="closeGroupModal()">&times;</button>
            </div>
            <form id="groupForm" class="modal-form">
                <input type="hidden" id="groupId">
                <div class="form-group">
                    <label for="groupName">Назва групи *</label>
                    <input type="text" id="groupName" required placeholder="Наприклад: Початківці 6-8 років">
                </div>
                <div class="form-group">
                    <label for="lessonType">Тип заняття</label>
                    <select id="lessonType">
                        <option value="gymnastics">Гімнастика</option>
                        <option value="acrobatics">Акробатика</option>
                        <option value="other">Інше</option>
                    </select>
                </div>
                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" id="isIndividual">
                        <span>Це індивідуальне заняття</span>
                    </label>
                </div>
                <div class="form-group">
                    <label>Розклад занять</label>
                    <div class="schedule-builder">
                        <div class="schedule-row">
                            <label class="checkbox-label">
                                <input type="checkbox" class="day-checkbox" value="Понеділок">
                                <span>Понеділок</span>
                            </label>
                            <div class="time-range">
                                <input type="time" class="time-input start-time" data-day="Понеділок" disabled title="Час початку">
                                <span>-</span>
                                <input type="time" class="time-input end-time" data-day="Понеділок" disabled title="Час закінчення">
                            </div>
                        </div>
                        <div class="schedule-row">
                            <label class="checkbox-label">
                                <input type="checkbox" class="day-checkbox" value="Вівторок">
                                <span>Вівторок</span>
                            </label>
                            <div class="time-range">
                                <input type="time" class="time-input start-time" data-day="Вівторок" disabled title="Час початку">
                                <span>-</span>
                                <input type="time" class="time-input end-time" data-day="Вівторок" disabled title="Час закінчення">
                            </div>
                        </div>
                        <div class="schedule-row">
                            <label class="checkbox-label">
                                <input type="checkbox" class="day-checkbox" value="Середа">
                                <span>Середа</span>
                            </label>
                            <div class="time-range">
                                <input type="time" class="time-input start-time" data-day="Середа" disabled title="Час початку">
                                <span>-</span>
                                <input type="time" class="time-input end-time" data-day="Середа" disabled title="Час закінчення">
                            </div>
                        </div>
                        <div class="schedule-row">
                            <label class="checkbox-label">
                                <input type="checkbox" class="day-checkbox" value="Четвер">
                                <span>Четвер</span>
                            </label>
                            <div class="time-range">
                                <input type="time" class="time-input start-time" data-day="Четвер" disabled title="Час початку">
                                <span>-</span>
                                <input type="time" class="time-input end-time" data-day="Четвер" disabled title="Час закінчення">
                            </div>
                        </div>
                        <div class="schedule-row">
                            <label class="checkbox-label">
                                <input type="checkbox" class="day-checkbox" value="П'ятниця">
                                <span>П'ятниця</span>
                            </label>
                            <div class="time-range">
                                <input type="time" class="time-input start-time" data-day="П'ятниця" disabled title="Час початку">
                                <span>-</span>
                                <input type="time" class="time-input end-time" data-day="П'ятниця" disabled title="Час закінчення">
                            </div>
                        </div>
                        <div class="schedule-row">
                            <label class="checkbox-label">
                                <input type="checkbox" class="day-checkbox" value="Субота">
                                <span>Субота</span>
                            </label>
                            <div class="time-range">
                                <input type="time" class="time-input start-time" data-day="Субота" disabled title="Час початку">
                                <span>-</span>
                                <input type="time" class="time-input end-time" data-day="Субота" disabled title="Час закінчення">
                            </div>
                        </div>
                        <div class="schedule-row">
                            <label class="checkbox-label">
                                <input type="checkbox" class="day-checkbox" value="Неділя">
                                <span>Неділя</span>
                            </label>
                            <div class="time-range">
                                <input type="time" class="time-input start-time" data-day="Неділя" disabled title="Час початку">
                                <span>-</span>
                                <input type="time" class="time-input end-time" data-day="Неділя" disabled title="Час закінчення">
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeGroupModal()">Скасувати</button>
                    <button type="submit" class="btn btn-primary">Зберегти</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/config.js?v=1778184204"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js?v=1778184204"></script>
    <script src="../js/groups.js"></script>
</body>
</html>
