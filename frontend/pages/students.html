<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Учні - CRM</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-dumbbell"></i>
                <h2>CRM Школа</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Дашборд</span>
                </a>
                <a href="students.html" class="nav-item active">
                    <i class="fas fa-users"></i>
                    <span>Учні</span>
                </a>
                <a href="attendance.html" class="nav-item">
                    <i class="fas fa-clipboard-check"></i>
                    <span>Відвідування</span>
                </a>
                <a href="payments.html" class="nav-item">
                    <i class="fas fa-money-bill-wave"></i>
                    <span>Оплати</span>
                </a>
                <a href="groups.html" class="nav-item">
                    <i class="fas fa-layer-group"></i>
                    <span>Групи</span>
                </a>
                <a href="users.html" class="nav-item" id="usersLink" style="display: none;">
                    <i class="fas fa-user-cog"></i>
                    <span>Користувачі</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <div>
                        <p id="userName">Користувач</p>
                        <small id="userRole">Роль</small>
                    </div>
                </div>
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    Вийти
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <h1>Учні</h1>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="openAddStudentModal()">
                        <i class="fas fa-plus"></i>
                        Додати учня
                    </button>
                </div>
            </header>

            <!-- Filters -->
            <div class="filters-section">
                <div class="filter-group">
                    <input type="text" id="searchInput" placeholder="Пошук за ім'ям..." class="filter-input">
                </div>
                <div class="filter-group">
                    <select id="groupFilter" class="filter-select">
                        <option value="">Всі групи</option>
                    </select>
                </div>
                <div class="filter-group">
                    <select id="statusFilter" class="filter-select">
                        <option value="">Всі статуси</option>
                        <option value="active">Активні</option>
                        <option value="inactive">Неактивні</option>
                    </select>
                </div>
            </div>

            <!-- Students Table -->
            <div class="table-card">
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Ім'я</th>
                                <th>Дата народження</th>
                                <th>Телефон батьків</th>
                                <th>Група</th>
                                <th>Тренер</th>
                                <th>Статус</th>
                                <th>Дії</th>
                            </tr>
                        </thead>
                        <tbody id="studentsTable">
                            <tr>
                                <td colspan="7" class="text-center">Завантаження...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add/Edit Student Modal -->
    <div id="studentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Додати учня</h2>
                <button class="modal-close" onclick="closeStudentModal()">&times;</button>
            </div>
            <form id="studentForm" class="modal-form">
                <input type="hidden" id="studentId">
                <div class="form-row">
                    <div class="form-group">
                        <label for="firstName">Ім'я *</label>
                        <input type="text" id="firstName" required>
                    </div>
                    <div class="form-group">
                        <label for="lastName">Прізвище *</label>
                        <input type="text" id="lastName" required>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="birthDate">Дата народження *</label>
                        <input type="date" id="birthDate" required>
                    </div>
                    <div class="form-group">
                        <label for="phoneParent">Телефон батьків *</label>
                        <input type="tel" id="phoneParent" required placeholder="+380501234567">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="telegramParent">Telegram батьків</label>
                        <input type="text" id="telegramParent" placeholder="@username">
                    </div>
                    <div class="form-group">
                        <label for="groupId">Група</label>
                        <select id="groupId">
                            <option value="">Без групи</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="notes">Примітки</label>
                    <textarea id="notes" rows="3"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closeStudentModal()">Скасувати</button>
                    <button type="submit" class="btn btn-primary">Зберегти</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/config.js?v=1778184204"></script>
    <script src="../js/api.js?v=1778184204"></script>
    <script src="../js/students.js?v=1778184204"></script>
</body>
</html>
