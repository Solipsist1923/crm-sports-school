<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Відвідування - CRM</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="loadingSpinner" class="loading-spinner hidden"><div class="spinner-icon"></div></div>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-dumbbell"></i>
                <h2>CRM Школа</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Дашборд</span>
                </a>
                <a href="students.html" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Учні</span>
                </a>
                <a href="attendance.html" class="nav-item active">
                    <i class="fas fa-clipboard-check"></i>
                    <span>Відвідування</span>
                </a>
                <a href="assignments.html" class="nav-item">
                    <i class="fas fa-magic"></i>
                    <span>Призначення</span>
                </a>
                <a href="prices.html" class="nav-item">
                    <i class="fas fa-tags"></i>
                    <span>Прайс-лист</span>
                </a>
                <a href="groups.html" class="nav-item">
                    <i class="fas fa-layer-group"></i>
                    <span>Групи</span>
                </a>
                <a href="users.html" class="nav-item" id="usersLink" style="display: none;">
                    <i class="fas fa-user-cog"></i>
                    <span>Користувачі</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <div>
                        <p id="userName">Користувач</p>
                        <small id="userRoleDisplay">Роль</small>
                    </div>
                </div>
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    Вийти
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <div class="header-title-wrap">
                    <button class="mobile-toggle" id="mobileToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1>Відвідування</h1>
                </div>
                <div class="header-actions">
                    <div class="quick-date-filters">
                        <button class="btn btn-secondary btn-sm" onclick="changeDate(-1)">Вчора</button>
                        <button class="btn btn-secondary btn-sm" onclick="changeDate(0)">Сьогодні</button>
                        <button class="btn btn-secondary btn-sm" onclick="changeDate(1)">Завтра</button>
                        <button class="btn btn-secondary btn-sm" onclick="loadWeek()">Тиждень</button>
                    </div>
                    <input type="date" id="attendanceDateFilter" class="date-input" style="margin-left: 10px;">
                </div>
            </header>

            <!-- Assignments Grid (Сюди JS малює картки занять) -->
            <div id="assignmentsGrid" class="assignments-grid">
                <div class="text-center" style="grid-column: 1/-1; padding: 40px;">Завантаження занять...</div>
            </div>
        </main>
    </div>

    <!-- Mark Attendance Modal -->
    <div id="attendanceModal" class="modal">
        <div class="modal-content" style="max-width: 800px; max-height: 85vh; display: flex; flex-direction: column; overflow: hidden;">
            <div class="modal-header">
                <h2 id="attendanceModalTitle">Відмітка відвідування</h2>
                <button class="modal-close" onclick="closeAttendanceModal()">&times;</button>
            </div>
            <div class="modal-body" style="flex: 1; overflow-y: auto; padding: 20px;">
                <!-- Пошук для додавання учня, якого немає в списку -->
                <div class="form-group" style="margin-bottom: 20px;">
                    <div class="input-with-icon">
                        <i class="fas fa-search"></i>
                        <input type="text" id="addStudentToLessonSearch" placeholder="Додати учня до заняття...">
                    </div>
                    <div id="addStudentSuggestions" class="search-suggestions"></div>
                </div>

                <div id="studentsForAttendanceList">
                    <!-- Список учнів з чекбоксами (генерується JS) -->
                </div>
            </div>
            <div class="modal-footer">
                <div id="attendanceValidationMsg" class="validation-error-text"></div>
                <button type="button" class="btn btn-secondary" onclick="closeAttendanceModal()">Скасувати</button>
                <button type="button" id="confirmAttendanceBtn" class="btn btn-primary" disabled>
                    <i class="fas fa-check"></i> Підтвердити
                </button>
            </div>
        </div>
    </div>

    <script src="../js/config.js?v=1778184204"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js?v=1778184204"></script>
    <script src="../js/attendance.js"></script>
</body>
</html>
