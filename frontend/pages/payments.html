<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <meta http-equiv="Content-Security-Policy" content="upgrade-insecure-requests">
    <title>Оплати - CRM</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-dumbbell"></i>
                <h2>CRM Школа</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <i class="fas fa-home"></i>
                    <span>Дашборд</span>
                </a>
                <a href="students.html" class="nav-item">
                    <i class="fas fa-users"></i>
                    <span>Учні</span>
                </a>
                <a href="attendance.html" class="nav-item">
                    <i class="fas fa-clipboard-check"></i>
                    <span>Відвідування</span>
                </a>
                <a href="payments.html" class="nav-item active">
                    <i class="fas fa-money-bill-wave"></i>
                    <span>Оплати</span>
                </a>
                <a href="groups.html" class="nav-item">
                    <i class="fas fa-layer-group"></i>
                    <span>Групи</span>
                </a>
                <a href="users.html" class="nav-item" id="usersLink" style="display: none;">
                    <i class="fas fa-user-cog"></i>
                    <span>Користувачі</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <div>
                        <p id="userName">Користувач</p>
                        <small id="userRole">Роль</small>
                    </div>
                </div>
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i>
                    Вийти
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="content-header">
                <div class="header-title-wrap">
                    <button class="mobile-toggle" id="mobileToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1>Оплати</h1>
                </div>
                <div class="header-actions">
                    <button class="btn btn-secondary" onclick="showOverdue()">
                        <i class="fas fa-exclamation-triangle"></i>
                        Прострочені
                    </button>
                    <button class="btn btn-primary" onclick="openAddPaymentModal()">
                        <i class="fas fa-plus"></i>
                        Додати оплату
                    </button>
                </div>
            </header>

            <!-- Filters -->
            <div class="filters-section">
                <div class="filter-group">
                    <select id="studentFilter" class="filter-select">
                        <option value="">Всі учні</option>
                    </select>
                </div>
                <div class="filter-group">
                    <select id="typeFilter" class="filter-select">
                        <option value="">Всі типи</option>
                        <option value="subscription">Абонемент</option>
                        <option value="insurance">Страховка</option>
                        <option value="fund">Фонд</option>
                        <option value="other">Інше</option>
                    </select>
                </div>
                <div class="filter-group">
                    <select id="statusFilter" class="filter-select">
                        <option value="">Всі статуси</option>
                        <option value="paid">Оплачено</option>
                        <option value="pending">Очікується</option>
                        <option value="overdue">Прострочено</option>
                    </select>
                </div>
            </div>

            <!-- Payments Table -->
            <div class="table-card">
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Учень</th>
                                <th>Сума</th>
                                <th>Тип</th>
                                <th>Дата оплати</th>
                                <th>Наступна оплата</th>
                                <th>Статус</th>
                                <th>Дії</th>
                            </tr>
                        </thead>
                        <tbody id="paymentsTable">
                            <tr>
                                <td colspan="7" class="text-center">Завантаження...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Add Payment Modal -->
    <div id="paymentModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Додати оплату</h2>
                <button class="modal-close" onclick="closePaymentModal()">&times;</button>
            </div>
            <form id="paymentForm" class="modal-form">
                <div class="form-group">
                    <label for="paymentStudent">Учень *</label>
                    <select id="paymentStudent" required>
                        <option value="">Оберіть учня</option>
                    </select>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="paymentAmount">Сума *</label>
                        <input type="number" id="paymentAmount" required min="0" step="0.01">
                    </div>
                    <div class="form-group">
                        <label for="paymentType">Тип *</label>
                        <select id="paymentType" required>
                            <option value="subscription">Абонемент</option>
                            <option value="insurance">Страховка</option>
                            <option value="fund">Фонд</option>
                            <option value="other">Інше</option>
                        </select>
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="paymentDate">Дата оплати *</label>
                        <input type="date" id="paymentDate" required>
                    </div>
                    <div class="form-group">
                        <label for="nextPaymentDate">Наступна оплата</label>
                        <input type="date" id="nextPaymentDate">
                    </div>
                </div>
                <div class="form-group">
                    <label for="paymentNotes">Примітки</label>
                    <textarea id="paymentNotes" rows="3"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closePaymentModal()">Скасувати</button>
                    <button type="submit" class="btn btn-primary">Зберегти</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/config.js?v=1778184204"></script>
    <script src="../js/api.js?v=1778184204"></script>
    <script src="../js/payments.js"></script>
</body>
</html>
