<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Прайс-лист - CRM</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div id="loadingSpinner" class="loading-spinner hidden"><div class="spinner-icon"></div></div>
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <div class="app-container">
        <aside class="sidebar">
            <div class="sidebar-header">
                <i class="fas fa-dumbbell"></i>
                <h2>CRM Школа</h2>
            </div>
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Дашборд</span></a>
                <a href="students.html" class="nav-item"><i class="fas fa-users"></i><span>Учні</span></a>
                <a href="attendance.html" class="nav-item"><i class="fas fa-clipboard-check"></i><span>Відвідування</span></a>
                <a href="assignments.html" class="nav-item"><i class="fas fa-magic"></i><span>Призначення</span></a>
                <a href="prices.html" class="nav-item active"><i class="fas fa-tags"></i><span>Прайс-лист</span></a>
                <a href="groups.html" class="nav-item"><i class="fas fa-layer-group"></i><span>Групи</span></a>
                <a href="users.html" class="nav-item" id="usersLink" style="display: none;">
                    <i class="fas fa-user-cog"></i>
                    <span>Користувачі</span>
                </a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-info">
                    <i class="fas fa-user-circle"></i>
                    <div><p id="userName">Користувач</p><small id="userRoleDisplay">Роль</small></div>
                </div>
                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i>Вийти</button>
            </div>
        </aside>

        <main class="main-content">
            <header class="content-header">
                <div class="header-title-wrap">
                    <button class="mobile-toggle" id="mobileToggle">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h1>Прайс-лист (Каталог послуг)</h1>
                </div>
                <div class="header-actions">
                    <button class="btn btn-primary" id="addPriceBtn" onclick="openAddPriceModal()">
                        <i class="fas fa-plus"></i> Додати послугу
                    </button>
                </div>
            </header>

            <div class="table-card">
                <div class="table-container">
                    <table class="data-table">
                        <thead>
                            <tr>
                                <th>Назва послуги</th>
                                <th>Вартість</th>
                                <th>Тип</th>
                                <th>Дії</th>
                            </tr>
                        </thead>
                        <tbody id="pricesTable">
                            <tr><td colspan="4" class="text-center">Завантаження...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- Модалка -->
    <div id="priceModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Додати послугу</h2>
                <button class="modal-close" onclick="closePriceModal()">&times;</button>
            </div>
            <form id="priceForm" class="modal-form">
                <input type="hidden" id="priceId">
                <div class="form-group">
                    <label for="priceName">Назва послуги *</label>
                    <input type="text" id="priceName" required placeholder="Напр. Місячний абонемент (8 занять)">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label for="priceValue">Вартість (грн) *</label>
                        <input type="number" id="priceValue" required min="0">
                    </div>
                    <div class="form-group">
                        <label for="priceType">Тип послуги</label>
                        <select id="priceType">
                            <option value="subscription">Абонемент</option>
                            <option value="single">Разове заняття</option>
                            <option value="individual">Індивідуальне</option>
                            <option value="other">Інше</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="priceDescription">Опис</label>
                    <textarea id="priceDescription" rows="2"></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="closePriceModal()">Скасувати</button>
                    <button type="submit" class="btn btn-primary">Зберегти</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/utils.js"></script>
    <script src="../js/api.js"></script>
    <script src="../js/prices.js"></script>
</body>
</html>
